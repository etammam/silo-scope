name: Continuous Delivery

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DOTNET_VERSION: "10.0.x"
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
          - os: macos-latest
            name: macos-arm64
          - os: windows-latest
            name: win-x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            src/siloscope-desktop/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('src/siloscope-desktop/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install desktop dependencies
        working-directory: src/siloscope-desktop
        run: bun install --frozen-lockfile

      - name: Build stable desktop app
        working-directory: src/siloscope-desktop
        run: bun run build:stable

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: siloscope-desktop-${{ matrix.name }}
          path: src/siloscope-desktop/artifacts/*
          retention-days: 5

  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-desktop]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Display artifacts
        run: ls -la artifacts/

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx -p semantic-release -p @semantic-release/changelog -p @semantic-release/git -p conventional-changelog-conventionalcommits semantic-release
